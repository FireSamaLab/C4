<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C4 Construction - Assumptions</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header>
      <h1>C4 Construction Estimator</h1>
      <nav>
        <a href="/index.html">Dashboard</a>
        <a href="/new-project.html">New Project</a>
        <a href="/prices.html">Price List</a>
      </nav>
    </header>

    <main class="container">
      <section class="card">
        <h2>Assumptions</h2>
        <p class="muted" id="projectInfo">Loading project...</p>

        <form id="assumptionsForm">
          <div class="grid-3">
            <div>
              <label for="houseLength">House Length (ft)</label>
              <input id="houseLength" name="houseLength" type="number" min="1" step="0.1" required />
            </div>
            <div>
              <label for="houseWidth">House Width (ft)</label>
              <input id="houseWidth" name="houseWidth" type="number" min="1" step="0.1" required />
            </div>
            <div>
              <label for="numberOfFloors">Number of Floors</label>
              <input id="numberOfFloors" name="numberOfFloors" type="number" min="1" step="1" value="1" required />
            </div>
          </div>

          <div class="grid-3">
            <div>
              <label for="wallHeight">Wall Height (ft)</label>
              <input id="wallHeight" name="wallHeight" type="number" min="8" step="0.1" value="8" required />
            </div>
            <div>
              <label for="studSpacing">Stud Spacing (in)</label>
              <input id="studSpacing" name="studSpacing" type="number" min="12" step="1" value="16" required />
            </div>
            <div>
              <label for="joistSpacing">Joist Spacing (in)</label>
              <input id="joistSpacing" name="joistSpacing" type="number" min="12" step="1" value="16" required />
            </div>
          </div>

          <div class="grid-3">
            <div>
              <label for="wasteFactor">Waste Factor (%)</label>
              <input id="wasteFactor" name="wasteFactor" type="number" min="0" step="0.1" value="10" required />
            </div>
          </div>

          <div class="actions">
            <button type="submit">Save Assumptions</button>
            <button type="button" id="saveAndGenerateBtn">Save + Generate Estimate</button>
            <a class="button-secondary" href="/index.html">Back to Dashboard</a>
          </div>
        </form>

        <p id="status" class="muted"></p>
      </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/assumptions.js"></script>
  </body>
</html>
