<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C4 Construction - Hypothèses</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header>
      <h1>Estimateur C4 Construction</h1>
      <nav>
        <a href="/index.html">Tableau de bord</a>
        <a href="/new-project.html">Nouveau projet</a>
        <a href="/prices.html">Liste de prix</a>
      </nav>
    </header>

    <main class="container">
      <section class="card">
        <h2>Hypothèses</h2>
        <p class="muted" id="projectInfo">Chargement du projet...</p>

        <form id="assumptionsForm">
          <div class="grid-3">
            <div>
              <label for="houseLength">Longueur de la maison (pi)</label>
              <input id="houseLength" name="houseLength" type="number" min="1" step="0.1" required />
            </div>
            <div>
              <label for="houseWidth">Largeur de la maison (pi)</label>
              <input id="houseWidth" name="houseWidth" type="number" min="1" step="0.1" required />
            </div>
            <div>
              <label for="numberOfFloors">Nombre d'étages</label>
              <input id="numberOfFloors" name="numberOfFloors" type="number" min="1" step="1" value="1" required />
            </div>
          </div>

          <div class="grid-3">
            <div>
              <label for="wallHeight">Hauteur des murs (pi)</label>
              <input id="wallHeight" name="wallHeight" type="number" min="8" step="0.1" value="8" required />
            </div>
            <div>
              <label for="studSpacing">Espacement des montants (po)</label>
              <input id="studSpacing" name="studSpacing" type="number" min="12" step="1" value="16" required />
            </div>
            <div>
              <label for="joistSpacing">Espacement des solives (po)</label>
              <input id="joistSpacing" name="joistSpacing" type="number" min="12" step="1" value="16" required />
            </div>
          </div>

          <div class="grid-3">
            <div>
              <label for="wasteFactor">Facteur de perte (%)</label>
              <input id="wasteFactor" name="wasteFactor" type="number" min="0" step="0.1" value="10" required />
            </div>
          </div>

          <div class="actions">
            <button type="submit">Enregistrer les hypothèses</button>
            <button type="button" id="saveAndGenerateBtn">Enregistrer + générer l'estimation</button>
            <a class="button-secondary" href="/index.html">Retour au tableau de bord</a>
          </div>
        </form>

        <p id="status" class="muted"></p>
      </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/assumptions.js"></script>
  </body>
</html>
