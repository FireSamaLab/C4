<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prix matériaux – C4 Construction</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container hero-shell">
        <div class="brand-block">
          <img
            src="assets/c4-logo.png"
            alt="Logo C4 Construction"
            class="brand-logo"
            onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='grid';"
          />
          <div id="logoFallback" class="brand-logo logo-fallback" style="display: none">C4</div>
          <div class="brand-copy">
            <p class="eyebrow">C4 CONSTRUCTION • OUTAOUAIS</p>
            <h1>Estimateur AI C4</h1>
            <p class="muted-light">Application en développement (MVP).</p>
          </div>
        </div>
      </div>
    </header>

    <nav class="side-nav" aria-label="Navigation principale">
      <a class="side-link" href="index.html">Tableau de bord</a>
      <a class="side-link" href="create-project.html">Créer un projet</a>
      <a class="side-link active" href="prices.html" aria-current="page">Prix & configuration</a>
    </nav>

    <main class="container content-with-sidebar">
      <section class="card card-dashboard">
        <div class="section-head">
          <h2>Mise à jour des prix</h2>
        </div>

        <div class="row gap action-wrap">
          <button id="btnImportRona" class="btn-primary">Importer les prix RONA</button>
          <button id="btnSavePrices" class="btn-secondary">Enregistrer les prix manuels</button>
        </div>

        <p id="priceStatus" class="muted">Aucune action en cours.</p>
      </section>

      <section class="card">
        <div class="section-head">
          <h3>Prix normalisés</h3>
        </div>
        <p class="muted section-caption">Mettez à jour les valeurs puis enregistrez les prix manuels.</p>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Clé</th>
                <th>Titre source</th>
                <th>Prix ($)</th>
              </tr>
            </thead>
            <tbody id="pricesTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module" src="scripts/prices-view.js"></script>
  </body>
</html>
